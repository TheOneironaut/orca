name: Sync upstream and RTL patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-upstream-and-rtl.yml
      - README.md
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-and-rtl
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main into fork main
        run: |
          git remote add upstream https://github.com/stablyai/orca.git
          git fetch upstream main
          git merge --no-edit upstream/main

      - name: Keep Windows RTL download link at top of README
        shell: python
        run: |
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          start = "<!-- ORCA_RTL_DOWNLOAD_START -->"
          end = "<!-- ORCA_RTL_DOWNLOAD_END -->"
          block = "\n".join([
              start,
              '<p align="center">',
              '  <strong>Hebrew / Arabic Native Chat build for Windows:</strong><br/>',
              '  <a href="https://github.com/TheOneironaut/orca/releases/download/rtl-latest/orca-rtl-windows-setup.exe"><strong>Download the latest Orca RTL Windows installer</strong></a>',
              '  · <a href="https://github.com/TheOneironaut/orca/releases/tag/rtl-latest">Release details &amp; SHA-256</a>',
              '</p>',
              end,
              '',
          ])

          if start in text and end in text:
              before, remainder = text.split(start, 1)
              _, after = remainder.split(end, 1)
              updated = before + block + after.lstrip("\n")
          else:
              anchor = "</h1>"
              if anchor not in text:
                  raise SystemExit("README heading anchor not found")
              updated = text.replace(anchor, anchor + "\n\n" + block, 1)

          path.write_text(updated, encoding="utf-8")

      - name: Commit and push synchronized main
        run: |
          if ! git diff --quiet -- README.md; then
            git add README.md
            git commit -m "docs: keep latest Windows RTL download link"
          fi
          git push origin main

      - name: Rebase RTL patch branch onto updated main
        run: |
          git fetch origin fix/native-chat-rtl
          git switch fix/native-chat-rtl
          git rebase origin/main
          git push origin fix/native-chat-rtl --force-with-lease
